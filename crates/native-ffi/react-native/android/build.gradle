plugins {
	id 'com.android.library'
	id 'org.jetbrains.kotlin.android'
}

android {
	namespace 'com.candypoets.nipworker.reactnative'
	compileSdk 35

	defaultConfig {
		minSdk 23
		consumerProguardFiles 'consumer-rules.pro'

		externalNativeBuild {
			cmake {
				cppFlags '-std=c++17 -fexceptions -frtti'
			}
		}
	}

	externalNativeBuild {
		cmake {
			path 'CMakeLists.txt'
		}
	}

	sourceSets {
		main {
			jniLibs.srcDir '../../android/src/main/jniLibs'
		}
	}
}

dependencies {
	compileOnly 'com.facebook.react:react-android:+'
}
