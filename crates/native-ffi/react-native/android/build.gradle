plugins {
	id 'com.android.library'
	id 'org.jetbrains.kotlin.android'
	id 'com.facebook.react'
}

def resolveReactNativeDirectory() {
	def reactNativePackage = providers.exec {
		workingDir(rootDir)
		commandLine("node", "--print", "require.resolve('react-native/package.json')")
	}.standardOutput.asText.get().trim()
	return file(reactNativePackage).parentFile
}

static def toPlatformFileString(String path) {
	return org.gradle.internal.os.OperatingSystem.current().isWindows()
		? path.replace(File.separatorChar, '/' as char)
		: path
}

def reactNativeRootDir = resolveReactNativeDirectory()
def packageRootDir = new File(projectDir, "../../../..").canonicalFile
def nipworkerVersion = new groovy.json.JsonSlurper().parse(
	new File(packageRootDir, "package.json")
).version

react {
	root = packageRootDir
	jsRootDir = file("${packageRootDir}/src/specs")
	libraryName = "NipworkerReactNativeSpec"
	codegenJavaPackageName = "com.candypoets.nipworker.reactnative"
}

// This project can be linked from outside node_modules (as in nuts-rn). In that
// layout the RN Gradle plugin discovers the consuming app's package.json and
// silently generates the app spec for this library. Pin the task inputs to the
// nipworker package so autolinking and the generated CMake target agree.
tasks.named("generateCodegenSchemaFromJavaScript").configure {
	jsRootDir.set(file("${packageRootDir}/src/specs"))
}

tasks.named("generateCodegenArtifactsFromSchema").configure {
	packageJsonFile.set(file("${packageRootDir}/package.json"))
}

android {
	namespace 'com.candypoets.nipworker.reactnative'
	compileSdk rootProject.ext.has('compileSdkVersion') ? rootProject.ext.compileSdkVersion : 35

	buildFeatures {
		prefab true
	}

	sourceSets {
		main {
			java.srcDirs += ["$buildDir/generated/source/codegen/java"]
		}
	}

	defaultConfig {
		minSdk rootProject.ext.has('minSdkVersion') ? rootProject.ext.minSdkVersion : 23
		consumerProguardFiles 'consumer-rules.pro'

		externalNativeBuild {
			cmake {
				arguments "-DANDROID_STL=c++_shared",
					"-DREACT_NATIVE_DIR=${toPlatformFileString(reactNativeRootDir.path)}"
				cppFlags '-std=c++17 -fexceptions -frtti'
			}
		}
	}

	externalNativeBuild {
		cmake {
			path 'CMakeLists.txt'
		}
	}

}

dependencies {
	implementation 'com.facebook.react:react-android'
	implementation "com.candypoets:nipworker-native-ffi-android:${nipworkerVersion}"
	api 'com.google.flatbuffers:flatbuffers-java:25.2.10'
}
