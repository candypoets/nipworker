plugins {
	id 'com.android.library'
	id 'org.jetbrains.kotlin.android'
}

android {
	namespace 'com.candypoets.nipworker.reactnative'
	compileSdk 35

	defaultConfig {
		minSdk 23
		consumerProguardFiles 'consumer-rules.pro'
	}

	sourceSets {
		main {
			jniLibs.srcDir '../../android/src/main/jniLibs'
		}
	}
}

dependencies {
	compileOnly 'com.facebook.react:react-android:+'
}
