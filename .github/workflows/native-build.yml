name: Native Mobile Builds

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────
  # Android — build AAR with .so for all 4 ABIs
  # ──────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: '27.0.12077973'
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 8.10.2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true
          link-to-sdk: true

      - name: Add Android Rust targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android \
            i686-linux-android

      - name: Build Android AAR
        working-directory: crates/native-ffi/android
        run: ./build-android-aar.sh

      - name: Validate Android AAR
        working-directory: crates/native-ffi/android
        run: ./validate-aar.sh

      - name: Upload Android AAR
        uses: actions/upload-artifact@v7
        with:
          name: android-aar
          path: crates/native-ffi/android/build/outputs/aar/*-release.aar
          if-no-files-found: error

      - name: Upload Android JNI libraries
        uses: actions/upload-artifact@v7
        with:
          name: android-jniLibs
          path: crates/native-ffi/android/src/main/jniLibs/
          if-no-files-found: error

  # ──────────────────────────────────────────
  # iOS — build .a for device + simulator
  # ──────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Add iOS Rust targets
        run: |
          rustup target add \
            aarch64-apple-ios \
            aarch64-apple-ios-sim \
            x86_64-apple-ios \
            aarch64-apple-darwin \
            x86_64-apple-darwin

      - name: Build iOS XCFramework
        working-directory: crates/native-ffi/ios
        run: ./build-ios.sh

      - name: Upload iOS XCFramework
        uses: actions/upload-artifact@v7
        with:
          name: ios-xcframework
          path: crates/native-ffi/ios/NipworkerNativeFFI.xcframework/
          if-no-files-found: error

      - name: Upload iOS static library
        uses: actions/upload-artifact@v7
        with:
          name: ios-staticlib
          path: crates/native-ffi/ios/Frameworks/ios-arm64/libnipworker_native_ffi.a
          if-no-files-found: error

  # ──────────────────────────────────────────
  # Linux host — build .so for local testing
  # ──────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Build Linux library
        working-directory: crates/native-ffi
        run: cargo build --release

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-host
          path: |
            crates/native-ffi/target/release/libnipworker_native_ffi.so
            crates/native-ffi/target/release/libnipworker_native_ffi.a
          if-no-files-found: error

  # ──────────────────────────────────────────
  # Release — attach all native artifacts
  # ──────────────────────────────────────────
  release-native:
    needs: [build-android, build-ios, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./native-artifacts
          merge-multiple: false

      - name: Package iOS XCFramework
        run: |
          mv native-artifacts/ios-xcframework native-artifacts/NipworkerNativeFFI.xcframework
          cd native-artifacts
          zip -r nipworker-native-ios.zip NipworkerNativeFFI.xcframework

      - name: Package iOS static library
        run: |
          cd native-artifacts/ios-staticlib
          zip -r ../nipworker-native-ios-static.zip .

      - name: Package Linux
        run: |
          cd native-artifacts/linux-host
          zip -r ../nipworker-native-linux.zip .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            native-artifacts/android-aar/nipworker-native-ffi-android-release.aar
            native-artifacts/nipworker-native-ios.zip
            native-artifacts/nipworker-native-ios-static.zip
            native-artifacts/nipworker-native-linux.zip
          append_body: true
          body: |
            ## 📱 Native Mobile Libraries

            Pre-built native libraries for `@candypoets/nipworker`. The npm package
            bundles the Android JNI libraries and iOS XCFramework for React Native
            autolinking.

            | Platform | Download | Integration |
            |----------|----------|-------------|
            | **Android** | `nipworker-native-ffi-android-release.aar` | Direct native integration; React Native receives the JNI libraries through npm |
            | **iOS (XCFramework)** | `nipworker-native-ios.zip` | Direct native integration; React Native receives it through npm/CocoaPods |
            | **iOS (static lib)** | `nipworker-native-ios-static.zip` | Low-level direct integration |
            | **Linux** | `nipworker-native-linux.zip` | For local FFI testing only |

            ### React Native
            ```sh
            npm install @candypoets/nipworker
            cd ios && pod install
            ```

            ```typescript
            import { createNostrManager, setManager } from '@candypoets/nipworker/react-native';

            const backend = createNostrManager();
            setManager(backend);
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
