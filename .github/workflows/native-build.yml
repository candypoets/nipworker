name: Native Mobile Builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────
  # Android — build AAR with .so for all 4 ABIs
  # ──────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: '27.0.12077973'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true
          link-to-sdk: true

      - name: Add Android Rust targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android \
            i686-linux-android

      - name: Build Android AAR
        working-directory: crates/native-ffi/android
        run: ./build-android-aar.sh

      - name: Validate Android AAR
        working-directory: crates/native-ffi/android
        run: ./validate-aar.sh

      - name: Upload Android AAR
        uses: actions/upload-artifact@v4
        with:
          name: android-aar
          path: crates/native-ffi/android/build/outputs/aar/*-release.aar

      - name: Upload Android JNI libraries
        uses: actions/upload-artifact@v4
        with:
          name: android-jniLibs
          path: crates/native-ffi/android/src/main/jniLibs/

  # ──────────────────────────────────────────
  # iOS — build .a for device + simulator
  # ──────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add iOS Rust targets
        run: |
          rustup target add \
            aarch64-apple-ios \
            aarch64-apple-ios-sim \
            x86_64-apple-ios \
            aarch64-apple-darwin \
            x86_64-apple-darwin

      - name: Build iOS XCFramework
        working-directory: crates/native-ffi/ios
        run: ./build-ios.sh

      - name: Upload iOS XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcframework
          path: crates/native-ffi/ios/NipworkerNativeFFI.xcframework/

      - name: Upload iOS static library
        uses: actions/upload-artifact@v4
        with:
          name: ios-staticlib
          path: crates/native-ffi/ios/Frameworks/ios-arm64/libnipworker_native_ffi.a

  # ──────────────────────────────────────────
  # Linux host — build .so for local testing
  # ──────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux library
        working-directory: crates/native-ffi
        run: cargo build --release

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-host
          path: |
            crates/native-ffi/target/release/libnipworker_native_ffi.so
            crates/native-ffi/target/release/libnipworker_native_ffi.a

  # ──────────────────────────────────────────
  # Release — attach all native artifacts
  # ──────────────────────────────────────────
  release-native:
    needs: [build-android, build-ios, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./native-artifacts
          merge-multiple: false

      - name: Package iOS XCFramework
        run: |
          cd native-artifacts/ios-xcframework
          zip -r ../nipworker-native-ios.zip .

      - name: Package iOS static library
        run: |
          cd native-artifacts/ios-staticlib
          zip -r ../nipworker-native-ios-static.zip .

      - name: Package Linux
        run: |
          cd native-artifacts/linux-host
          zip -r ../nipworker-native-linux.zip .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            native-artifacts/android-aar/nipworker-native-ffi-android-release.aar
            native-artifacts/nipworker-native-ios.zip
            native-artifacts/nipworker-native-ios-static.zip
            native-artifacts/nipworker-native-linux.zip
          append_body: true
          body: |
            ## 📱 Native Mobile Libraries

            Pre-built native libraries for LynxJS integrators:

            | Platform | Download | Integration |
            |----------|----------|-------------|
            | **Android** | `nipworker-native-ffi-android-release.aar` | Add `com.candypoets:nipworker-native-ffi-android:<version>` or include the local Gradle project |
            | **iOS (XCFramework)** | `nipworker-native-ios.zip` | Drag `NipworkerNativeFFI.xcframework` into Xcode |
            | **iOS (static lib)** | `nipworker-native-ios-static.zip` | Drop `libnipworker_native_ffi.a` into CocoaPods project |
            | **Linux** | `nipworker-native-linux.zip` | For local FFI testing only |

            ### Android
            ```kotlin
            implementation("com.candypoets:nipworker-native-ffi-android:<version>")
            ```

            Register the module:
            ```kotlin
            "NipworkerLynxModule" to SparklingLynxModuleWrapper(
              NipworkerLynxModule::class.java,
              null
            )
            ```

            ### iOS
            In Xcode, add `NipworkerNativeFFI.xcframework` to **Frameworks, Libraries, and Embedded Content** (set to "Embed & Sign").

            ### LynxJS TypeScript
            ```typescript
            import { createNostrManager, setManager } from '@candypoets/nipworker';
            const backend = createNostrManager();
            setManager(backend);
            ```
            `createNostrManager()` auto-detects the Lynx native module at runtime.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
