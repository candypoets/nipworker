name: Node.js Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
      CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
      SKIP_NATIVE_BUILD: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      # Setup Rust
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      # Install wasm-pack
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Install latest Binaryen (wasm-opt)
      - name: Install latest Binaryen (wasm-opt)
        run: |
          BINARYEN_VERSION=version_121
          curl -L -o binaryen.tar.gz https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz
          tar -xzf binaryen.tar.gz
          echo "${{ github.workspace }}/binaryen-${BINARYEN_VERSION}/bin" >> $GITHUB_PATH

      - name: Show wasm-opt version
        run: wasm-opt --version

      # Monitor system resources
      - name: Check system resources
        run: |
          echo "=== System Memory ==="
          free -h
          echo "=== Disk Space ==="
          df -h
          echo "=== CPU Info ==="
          nproc
          echo "=== Swap ==="
          swapon --show

      # Read package version
      - name: Read package version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Ensure tag matches package.json version
      - name: Ensure tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$TAG" != "${{ steps.pkg.outputs.version }}" ]; then
            echo "Tag ($GITHUB_REF_NAME) does not match package.json version (${{ steps.pkg.outputs.version }})"
            exit 1
          fi

      # Check if version already published on npm
      - name: Check if version already published on npm
        id: check_publish
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          if npm view @candypoets/nipworker@"$VERSION" version >/dev/null 2>&1; then
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION already exists on npm. Skipping publish."
          else
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      # Install dependencies
      - run: npm ci
        if: ${{ steps.check_publish.outputs.should_publish == 'true' }}

      # Build JS/WASM package. Native mobile artifacts are built in native-build.yml.
      - name: Build package
        if: ${{ steps.check_publish.outputs.should_publish == 'true' }}
        run: npm run build:package

      # ──────────────────────────────────────────
      # Wait for native builds and bundle artifacts
      # ──────────────────────────────────────────
      - name: Wait for native build workflow
        if: ${{ steps.check_publish.outputs.should_publish == 'true' && env.SKIP_NATIVE_BUILD != 'true' }}
        run: |
          for i in {1..60}; do
            RUN_JSON=$(gh run list --workflow=native-build.yml --json databaseId,headSha,conclusion,status --jq ".[] | select(.headSha == \"${GITHUB_SHA}\") | {conclusion,status}" | head -1)
            CONCLUSION=$(echo "$RUN_JSON" | jq -r '.conclusion // empty')
            STATUS=$(echo "$RUN_JSON" | jq -r '.status // empty')

            if [ "$CONCLUSION" == "success" ]; then
              echo "Native build succeeded"
              exit 0
            elif [ "$CONCLUSION" == "failure" ] || [ "$CONCLUSION" == "cancelled" ]; then
              echo "Native build failed: $CONCLUSION"
              exit 1
            fi
            echo "Waiting for native build... status=$STATUS ($i/60)"
            sleep 10
          done
          echo "Timed out waiting for native build"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download native artifacts
        if: ${{ steps.check_publish.outputs.should_publish == 'true' && env.SKIP_NATIVE_BUILD != 'true' }}
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: native-build.yml
          commit: ${{ github.sha }}
          path: ./prebuilt-temp

      - name: Organize native artifacts
        if: ${{ steps.check_publish.outputs.should_publish == 'true' && env.SKIP_NATIVE_BUILD != 'true' }}
        run: |
          rm -rf crates/native-ffi/android/src/main/jniLibs
          rm -rf crates/native-ffi/ios/NipworkerNativeFFI.xcframework

          if [ -d "prebuilt-temp/android-jniLibs" ]; then
            mkdir -p crates/native-ffi/android/src/main
            mv prebuilt-temp/android-jniLibs/jniLibs crates/native-ffi/android/src/main/
          else
            echo "Missing android-jniLibs artifact"
            exit 1
          fi

          if [ -d "prebuilt-temp/ios-xcframework" ]; then
            mv prebuilt-temp/ios-xcframework/NipworkerNativeFFI.xcframework crates/native-ffi/ios/
          else
            echo "Missing ios-xcframework artifact"
            exit 1
          fi

          if [ -d "prebuilt-temp/linux-host" ]; then
            mkdir -p prebuilt/linux
            mv prebuilt-temp/linux-host/* prebuilt/linux/
          fi

          rm -rf prebuilt-temp
          echo "=== React Native native artifacts ==="
          find crates/native-ffi/android/src/main/jniLibs -type f | sort
          find crates/native-ffi/ios/NipworkerNativeFFI.xcframework -type f | sort

      - name: Verify React Native native artifacts
        if: ${{ steps.check_publish.outputs.should_publish == 'true' && env.SKIP_NATIVE_BUILD != 'true' }}
        run: |
          set -euo pipefail

          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            test -f "crates/native-ffi/android/src/main/jniLibs/${abi}/libnipworker_native_ffi.so"
          done
          test -f crates/native-ffi/ios/NipworkerNativeFFI.xcframework/ios-arm64/libnipworker_native_ffi.a
          test -f crates/native-ffi/ios/NipworkerNativeFFI.xcframework/ios-arm64_x86_64-simulator/libnipworker_native_ffi.a

          if find crates/native-ffi/android/src/main/jniLibs crates/native-ffi/ios/NipworkerNativeFFI.xcframework -type f \( -name '*.so' -o -name '*.a' \) -print0 \
            | xargs -0 strings \
            | grep -q 'fetch_mint_keys_from_network not available'; then
            echo "Native artifacts contain stale proof key fetch stub"
            exit 1
          fi

          node -e '
            const fs = require("fs");
            const files = require("./package.json").files;
            const required = [
              "crates/native-ffi/android/src/main/jniLibs/arm64-v8a/libnipworker_native_ffi.so",
              "crates/native-ffi/android/src/main/jniLibs/armeabi-v7a/libnipworker_native_ffi.so",
              "crates/native-ffi/android/src/main/jniLibs/x86/libnipworker_native_ffi.so",
              "crates/native-ffi/android/src/main/jniLibs/x86_64/libnipworker_native_ffi.so",
              "crates/native-ffi/ios/NipworkerNativeFFI.xcframework/ios-arm64/libnipworker_native_ffi.a",
              "crates/native-ffi/ios/NipworkerNativeFFI.xcframework/ios-arm64_x86_64-simulator/libnipworker_native_ffi.a",
            ];
            const missing = required.filter((path) => !fs.existsSync(path));
            if (missing.length) {
              console.error("Missing native artifacts:\\n" + missing.join("\\n"));
              process.exit(1);
            }
            const packageRoots = [
              "crates/native-ffi/android/src/main/jniLibs",
              "crates/native-ffi/ios/NipworkerNativeFFI.xcframework",
            ];
            const missingRoots = packageRoots.filter((root) => !files.includes(root));
            if (missingRoots.length) {
              console.error("package.json files does not include native artifact roots:\\n" + missingRoots.join("\\n"));
              process.exit(1);
            }
          '

      # Publish package to npm
      - name: Publish package to npm
        if: ${{ steps.check_publish.outputs.should_publish == 'true' }}
        id: publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}

      # Update GitHub Release with npm info (native-build.yml creates the release)
      - name: Update GitHub Release body
        if: ${{ steps.publish.outcome == 'success' }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --notes "🚀 **Release ${{ github.ref_name }}**\n\n## 📦 Published Package\n- **[@candypoets/nipworker](https://www.npmjs.com/package/@candypoets/nipworker)** - ${{ github.ref_name }}\n\n$(gh release view "${GITHUB_REF_NAME}" --json body -q '.body')"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
